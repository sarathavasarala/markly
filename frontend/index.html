<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#eef1ee" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0d11" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="markly - your daily reading brief" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" />

  <!-- SEO -->
  <title>markly - your daily reading brief</title>
  <meta name="description"
    content="markly turns the blogs and newsletters you follow into a synthesized daily brief. Read what matters, keep what's worth it, share what you love." />

  <!-- Open Graph / WhatsApp / Facebook / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://markly.azurewebsites.net/" />
  <meta property="og:title" content="markly - your daily reading brief" />
  <meta property="og:description"
    content="markly turns the blogs and newsletters you follow into a synthesized daily brief. Read what matters, keep what's worth it, share what you love." />
  <meta property="og:site_name" content="markly" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="markly - your daily reading brief" />
  <meta name="twitter:description"
    content="markly turns the blogs and newsletters you follow into a synthesized daily brief. Read what matters, keep what's worth it, share what you love." />
</head>

<body class="antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
