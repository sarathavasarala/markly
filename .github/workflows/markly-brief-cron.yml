name: Markly Generate Brief

on:
  schedule:
    # Once a day at 22:12 UTC (2 hours before midnight UTC / ~3:42 AM IST)
    - cron: '12 22 * * *'
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Execute HTTP POST request
        run: |
          if [ -z "${{ secrets.MARKLY_APP_URL }}" ]; then
            echo "Error: secrets.MARKLY_APP_URL is not set"
            exit 1
          fi
          if [ -z "${{ secrets.MARKLY_CRON_SECRET }}" ]; then
            echo "Error: secrets.MARKLY_CRON_SECRET is not set"
            exit 1
          fi
          
          curl -X POST "${{ secrets.MARKLY_APP_URL }}/api/cron/brief" \
            -H "Authorization: Bearer ${{ secrets.MARKLY_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -f
