name: Markly CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
          
      - name: Lint with flake8
        run: |
          cd backend
          python -m flake8 .
          
      - name: Test with pytest
        run: |
          cd backend
          python -m pytest

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Lint
        run: |
          cd frontend
          npm run lint
          
      - name: Run Vitest
        run: |
          cd frontend
          npm run test
          
      - name: Build
        run: |
          cd frontend
          npm run build

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Start backend
        run: |
          cd backend
          APP_ENV=test MARKLY_DB_PATH=/tmp/markly-e2e.db FLASK_APP=app:create_app nohup python -m flask run --host 0.0.0.0 --port 5050 > /tmp/markly-backend.log 2>&1 &
          sleep 5
          curl --fail http://localhost:5050/api/health
        env:
          AZURE_OPENAI_ENDPOINT: https://test.openai.azure.com
          AZURE_OPENAI_API_KEY: test-openai-key
          
      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test
